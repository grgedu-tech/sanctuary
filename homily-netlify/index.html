<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Homily</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: #FAF8F4;
  color: #1C1C1C;
  min-height: 100vh;
}

nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 3rem;
  border-bottom: 1px solid #E4DFD6;
  background: #FAF8F4;
  position: sticky;
  top: 0;
  z-index: 10;
}

.brand { font-size: 1.1rem; font-weight: 500; letter-spacing: 0.02em; }
.brand em { color: #B8872A; font-style: normal; }

.nav-links { display: flex; gap: 1.75rem; align-items: center; }

.nav-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 0.82rem;
  color: #999;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.2rem 0;
  border-bottom: 1px solid transparent;
  transition: color 0.15s;
}
.nav-btn:hover { color: #B8872A; }
.nav-btn.active { color: #B8872A; border-bottom-color: #B8872A; }

.lang-toggle {
  display: flex;
  border: 1px solid #DDD8D0;
  border-radius: 20px;
  overflow: hidden;
}
.lang-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 0.25rem 0.7rem;
  color: #aaa;
  transition: all 0.15s;
}
.lang-btn.active { background: #B8872A; color: #fff; }

.admin-link {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 0.78rem;
  color: #ccc;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: color 0.15s;
}
.admin-link:hover { color: #B8872A; }

main {
  max-width: 700px;
  margin: 0 auto;
  padding: 4rem 2rem 5rem;
}

.read-date {
  font-size: 0.78rem;
  color: #aaa;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

.gold-rule {
  border: none;
  border-top: 1px solid #B8872A;
  opacity: 0.35;
  margin: 1.75rem 0;
}

.homily-text {
  font-size: 1.12rem;
  line-height: 2;
  white-space: pre-wrap;
  word-wrap: break-word;
}

.print-link {
  display: inline-block;
  margin-top: 2.5rem;
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 0.78rem;
  color: #B8872A;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.print-link:hover { text-decoration: underline; }

.notice {
  font-size: 0.8rem;
  color: #999;
  background: #F0EDE8;
  border-left: 2px solid #B8872A;
  padding: 0.65rem 1rem;
  margin-bottom: 2.5rem;
  border-radius: 2px;
}

.section-lbl {
  font-size: 0.68rem;
  color: #B8872A;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 1.75rem;
}

.arch-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  padding: 1rem 0;
  border-bottom: 1px solid #E4DFD6;
  cursor: pointer;
}
.arch-item:last-child { border-bottom: none; }
.arch-item:hover .arch-preview { color: #B8872A; }
.arch-date { font-size: 0.75rem; color: #aaa; margin-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.04em; }
.arch-preview { font-size: 0.97rem; color: #444; transition: color 0.15s; }
.arch-arrow { color: #ccc; font-size: 1.2rem; flex-shrink: 0; }

.back-link {
  display: block;
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 0.78rem;
  color: #aaa;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 2rem;
  text-align: left;
}
.back-link:hover { color: #B8872A; }

.empty { text-align: center; padding: 6rem 1rem; }
.empty h2 { font-size: 1.5rem; font-weight: 400; color: #888; margin-bottom: 0.5rem; }
.empty p { font-size: 0.95rem; color: #bbb; }

.loading { text-align: center; padding: 6rem 1rem; font-size: 0.9rem; color: #ccc; letter-spacing: 0.05em; }

@media print {
  nav { display: none; }
  main { padding: 1rem; max-width: 100%; }
  .print-link, .notice { display: none; }
}
</style>
</head>
<body>

<nav>
  <span class="brand">Daily <em>Homily</em></span>
  <div class="nav-links">
    <button class="nav-btn active" id="nb-today"   onclick="show('today')">Today</button>
    <button class="nav-btn"        id="nb-archive" onclick="show('archive')">Archive</button>
    <div class="lang-toggle">
      <button class="lang-btn active" id="lb-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn"        id="lb-es" onclick="setLang('es')">ES</button>
    </div>
    <a class="admin-link" href="/admin">Admin</a>
  </div>
</nav>

<main id="main"><p class="loading">Loading&hellip;</p></main>

<script>
var lang        = 'en';
var currentView = 'today';
var ALL         = [];   // populated once on load

/* ── Labels ── */
var L = {
  en: {
    today:'Today', archive:'Archive',
    no_h:'No homily published yet.',
    no_hint:'Use the Admin panel to publish today\'s homily.',
    stale:'No entry for today \u2014 showing most recent',
    print:'Print this page', back:'\u2190 Archive',
    arch_empty_t:'Nothing here yet.',
    arch_empty_d:'Published homilies will appear here.'
  },
  es: {
    today:'Hoy', archive:'Archivo',
    no_h:'Ninguna homill\u00eda publicada.',
    no_hint:'Usa el panel de administraci\u00f3n para publicar la homill\u00eda de hoy.',
    stale:'Sin entrada para hoy \u2014 mostrando la m\u00e1s reciente',
    print:'Imprimir esta p\u00e1gina', back:'\u2190 Archivo',
    arch_empty_t:'Nada aqu\u00ed todav\u00eda.',
    arch_empty_d:'Las homill\u00edas publicadas aparecer\u00e1n aqu\u00ed.'
  }
};
function tx(k) { return (L[lang]||L.en)[k] || L.en[k] || k; }

/* ── Utilities ── */
function todayISO() {
  var n = new Date();
  return n.getFullYear() + '-' +
    String(n.getMonth()+1).padStart(2,'0') + '-' +
    String(n.getDate()).padStart(2,'0');
}
function fmt(iso) {
  var p = iso.split('-').map(Number);
  return new Date(p[0],p[1]-1,p[2]).toLocaleDateString(
    lang==='es' ? 'es-ES' : 'en-US',
    { weekday:'long', year:'numeric', month:'long', day:'numeric' }
  );
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function getText(entry) {
  return (entry && entry[lang]) || (entry && entry[lang==='en'?'es':'en']) || '';
}
function findEntry(date) {
  for (var i=0; i<ALL.length; i++) { if (ALL[i].date===date) return ALL[i]; }
  return null;
}

/* ── Data load ── */
function loadData(callback) {
  fetch('/homilies.json?v=' + Date.now())
    .then(function(r){ return r.ok ? r.json() : []; })
    .then(function(data){
      ALL = Array.isArray(data) ? data : [];
      ALL.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
      callback();
    })
    .catch(function(){ ALL = []; callback(); });
}

/* ── Language ── */
function setLang(l) {
  lang = l;
  document.getElementById('lb-en').classList.toggle('active', l==='en');
  document.getElementById('lb-es').classList.toggle('active', l==='es');
  document.getElementById('nb-today').textContent   = tx('today');
  document.getElementById('nb-archive').textContent = tx('archive');
  if (currentView==='today')   renderToday();
  if (currentView==='archive') renderArchive();
}

/* ── Nav ── */
function setNav(v) {
  ['today','archive'].forEach(function(id){
    var el = document.getElementById('nb-'+id);
    if (el) el.classList.toggle('active', id===v);
  });
}

function show(v) {
  currentView = v;
  if (v==='today')   renderToday();
  if (v==='archive') renderArchive();
}

/* ── Render: Today ── */
function renderToday() {
  setNav('today');
  var today  = todayISO();
  var entry  = findEntry(today);
  var notice = '';

  if (!entry && ALL.length) {
    entry  = ALL[0];
    notice = '<p class="notice">' + tx('stale') + ' (' + fmt(entry.date) + ')</p>';
  }

  if (!entry) {
    document.getElementById('main').innerHTML =
      '<div class="empty"><h2>' + tx('no_h') + '</h2><p>' + tx('no_hint') + '</p></div>';
    return;
  }

  var text = getText(entry);
  document.getElementById('main').innerHTML =
    notice +
    '<p class="read-date">' + fmt(entry.date) + '</p>' +
    '<hr class="gold-rule">' +
    '<div class="homily-text">' + esc(text) + '</div>' +
    '<button class="print-link" onclick="window.print()">' + tx('print') + '</button>';
}

/* ── Render: Archive ── */
function renderArchive() {
  setNav('archive');
  if (!ALL.length) {
    document.getElementById('main').innerHTML =
      '<div class="empty"><h2>' + tx('arch_empty_t') + '</h2><p>' + tx('arch_empty_d') + '</p></div>';
    return;
  }
  var html = '<p class="section-lbl">' + tx('archive') + '</p>';
  for (var i=0; i<ALL.length; i++) {
    var h = ALL[i];
    var text = getText(h);
    var preview = esc(text.replace(/\n/g,' ').substring(0,90)) + '\u2026';
    html +=
      '<div class="arch-item" onclick="showEntry(\'' + h.date + '\')">' +
      '<div>' +
      '<p class="arch-date">' + fmt(h.date) + '</p>' +
      '<p class="arch-preview">' + preview + '</p>' +
      '</div>' +
      '<span class="arch-arrow">&#8250;</span></div>';
  }
  document.getElementById('main').innerHTML = html;
}

/* ── Render: Single entry ── */
function showEntry(date) {
  setNav('archive');
  var entry = findEntry(date);
  if (!entry) return;
  var text = getText(entry);
  document.getElementById('main').innerHTML =
    '<button class="back-link" onclick="renderArchive()">' + tx('back') + '</button>' +
    '<p class="read-date">' + fmt(entry.date) + '</p>' +
    '<hr class="gold-rule">' +
    '<div class="homily-text">' + esc(text) + '</div>' +
    '<button class="print-link" onclick="window.print()">' + tx('print') + '</button>';
}

/* ── Init ── */
loadData(function(){ show('today'); });
</script>
</body>
</html>
